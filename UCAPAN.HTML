<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Romantic Card</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<!-- Page 1 -->
<div id="page1" class="page active">
  <h2 class="title">💌 Sebuah Pesan Spesial</h2>
  <p class="subtitle">Isi dulu sebelum lanjut...</p>

  <input id="from" placeholder="Nama kamu">
  <input id="to" placeholder="Untuk siapa">

  <button id="nextBtn" disabled onclick="next(2)">Lanjut ➝</button>
</div>

<!-- Page 2 -->
<div id="page2" class="hidden">
<h3>Page 2</h3>
<input id="meet" placeholder="Ketemu di mana">
<textarea id="first" placeholder="Kesan pertama"></textarea>
<button onclick="next(3)">Next</button>
</div>

<!-- Page 3 -->
<div id="page3" class="hidden">
<h3>Page 3</h3>
<textarea id="story" placeholder="Cerita perjalanan kalian"></textarea>
<button onclick="generateLink()">Generate Link</button>
</div>

<!-- Page 4 -->
<div id="page4" class="hidden">
<h3>Share Link</h3>
<input id="link" readonly>
<button onclick="copyLink()">Copy</button>
</div>

</div>

<script>
function next(page) {
  document.querySelectorAll('.container > div').forEach(d => d.classList.add('hidden'));
  document.getElementById('page' + page).classList.remove('hidden');
}

function generateLink() {
  const data = {
    from: document.getElementById('from').value,
    to: document.getElementById('to').value,
    meet: document.getElementById('meet').value,
    first: document.getElementById('first').value,
    story: document.getElementById('story').value
  };

  const encoded = btoa(JSON.stringify(data));
  const url = window.location.origin + window.location.pathname + '?data=' + encoded;

  document.getElementById('link').value = url;
  next(4);
}

function copyLink() {
  const input = document.getElementById('link');
  input.select();
  document.execCommand('copy');
  alert('Link copied!');
}

window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('data')) {
    const data = JSON.parse(atob(params.get('data')));
    document.body.innerHTML = `
      <div class="result">
        <h2>${data.from} ❤️ ${data.to}</h2>
        <p><b>Ketemu di:</b> ${data.meet}</p>
        <p><b>Kesan pertama:</b> ${data.first}</p>
        <p><b>Cerita:</b> ${data.story}</p>
      </div>
    `;
  }
}
</script>

</body>
</html>
